  <text x="25" y="30" text-anchor="middle" font-size="10" fill="url(#goldGradient)" font-family="serif">RC</text>

  <!-- Brand Text -->
  <text x="55" y="30" font-size="16" fill="url(#goldGradient)" font-family="Georgia, 'Times New Roman', serif" letter-spacing="1">
    RareCoin
